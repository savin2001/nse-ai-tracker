name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend → Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: cd frontend && npm ci && npm run build
      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=frontend/dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # RENDER_DEPLOY_HOOK_URL is a secret set in GitHub → Settings → Secrets.
        # Get it from: Render dashboard → nse-ai-tracker-api → Settings → Deploy Hook
        run: |
          curl -fsSL --retry 3 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy ID:', d.get('id','n/a'))"

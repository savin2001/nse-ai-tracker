name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend → Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: cd frontend && npm ci && npm run build
      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=frontend/dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # RENDER_DEPLOY_HOOK_URL must be set in GitHub → Settings → Secrets.
        # Get it from: Render dashboard → your API service → Settings → Deploy Hook → Copy URL
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping Render deploy."
            echo "   Add it at: GitHub repo → Settings → Secrets → Actions → New repository secret"
            exit 0
          fi
          echo "Triggering Render deploy…"
          RESPONSE=$(curl -fsSL --retry 3 -X POST "$RENDER_DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print('Deploy ID:', d.get('id', 'n/a'))
          except Exception:
              print('Deploy triggered (non-JSON response)')
          "
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

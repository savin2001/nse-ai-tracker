name: Production Health Check

on:
  # Run every 15 minutes on weekdays (EAT trading hours: 09:00–15:00 = 06:00–12:00 UTC)
  schedule:
    - cron: "*/15 6-12 * * 1-5"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  health:
    name: API + Frontend health check
    runs-on: ubuntu-latest

    steps:
      - name: Check API /health
        id: api_health
        run: |
          STATUS=$(curl -sf --max-time 10 "${{ vars.API_BASE_URL }}/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "API health: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Check API /health/detailed
        id: api_detailed
        if: success()
        run: |
          curl -sf --max-time 15 "${{ vars.API_BASE_URL }}/health/detailed" | python3 -m json.tool

      - name: Check frontend availability
        id: frontend_health
        run: |
          HTTP_CODE=$(curl -o /dev/null -sw "%{http_code}" --max-time 10 "${{ vars.FRONTEND_URL }}" || echo "000")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "Frontend HTTP: $HTTP_CODE"
          [[ "$HTTP_CODE" =~ ^2 ]] || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Health check failed — API: ${{ steps.api_health.outputs.status }}, Frontend HTTP: ${{ steps.frontend_health.outputs.http_code }}"
          # Extend here: POST to Slack/PagerDuty/BetterStack webhook
          # curl -X POST "${{ secrets.ALERT_WEBHOOK_URL }}" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"text\":\"NSE AI Tracker health check FAILED — $(date -u)\"}"

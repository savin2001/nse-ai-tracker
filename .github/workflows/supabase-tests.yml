name: Supabase DB Tests (RLS + Realtime)

on:
  push:
    branches: [main, develop]
    paths:
      - "supabase/**"
  pull_request:
    paths:
      - "supabase/**"

jobs:
  db-tests:
    name: pgTAP RLS Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Start a local Supabase stack (Postgres + auth + realtime)
      - name: Start Supabase local stack
        run: supabase start

      # Apply all migrations to the local DB
      - name: Push migrations
        run: supabase db push --local

      # Run pgTAP tests
      - name: Run RLS pgTAP tests
        run: supabase test db

      # Always capture test output even on failure
      - name: Stop Supabase
        if: always()
        run: supabase stop

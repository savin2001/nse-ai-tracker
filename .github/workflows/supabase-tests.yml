name: Supabase DB Tests (RLS + Realtime)

on:
  push:
    branches: [main, develop]
    paths:
      - "supabase/**"
  pull_request:
    paths:
      - "supabase/**"

jobs:
  db-tests:
    name: pgTAP RLS Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Start local Supabase stack (Postgres + auth + realtime + pgTAP)
      - name: Start Supabase local stack
        run: supabase start
        env:
          # Supabase CLI reads these for the local project
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # supabase db reset applies all migrations in order from scratch
      - name: Apply migrations (db reset)
        run: supabase db reset --local

      # Run pgTAP tests — supabase test db discovers *.sql in supabase/tests/
      - name: Run RLS pgTAP tests
        run: supabase test db --local

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

name: Apply Database Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase (nse schema)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ vars.SUPABASE_PROJECT_REF }}
        run: python3 scripts/migrate.py 2>&1 | tee /tmp/migrate_output.txt; exit ${PIPESTATUS[0]}

      - name: Upload output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-output
          path: /tmp/migrate_output.txt
          retention-days: 1

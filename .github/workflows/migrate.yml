name: Apply Database Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase (nse schema)
    runs-on: ubuntu-latest
    # No contents:write — output is uploaded as an artifact, not committed to main

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations via Supabase Management API
        id: migrate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          python3 scripts/migrate.py 2>&1 | tee /tmp/migrate_out.txt
          echo "exit_code=${PIPESTATUS[0]}" | tee /tmp/migrate_meta.txt

      - name: Upload migration output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-output-${{ github.run_id }}
          path: /tmp/migrate_out.txt
          retention-days: 30

      - name: Fail if migration script errored
        run: |
          code=$(grep -oP 'exit_code=\K[0-9]+' /tmp/migrate_meta.txt || echo 0)
          exit "$code"

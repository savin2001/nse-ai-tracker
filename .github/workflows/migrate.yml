name: Apply Database Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase (nse schema)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Test DB connection
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: |
          psql \
            "host=${{ secrets.PGHOST }} port=5432 dbname=${{ secrets.PGDATABASE }} user=${{ secrets.PGUSER }} sslmode=require" \
            -c "SELECT current_database(), current_user, version();"

      - name: Apply migrations
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: |
          CONN="host=${{ secrets.PGHOST }} port=5432 dbname=${{ secrets.PGDATABASE }} user=${{ secrets.PGUSER }} sslmode=require"
          for f in supabase/migrations/*.sql; do
            echo "▶ Applying $f ..."
            psql "$CONN" -v ON_ERROR_STOP=1 -f "$f"
            echo "✅ Done: $f"
          done

      - name: Verify nse schema tables
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: |
          psql \
            "host=${{ secrets.PGHOST }} port=5432 dbname=${{ secrets.PGDATABASE }} user=${{ secrets.PGUSER }} sslmode=require" \
            -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'nse' ORDER BY table_name;"

name: Apply Database Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase (nse schema)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          python3 scripts/migrate.py 2>&1 | tee /tmp/migrate_out.txt
          echo "exit_code=${PIPESTATUS[0]}" >> /tmp/migrate_meta.txt

      - name: Commit debug output to repo
        if: always()
        run: |
          mkdir -p debug
          cp /tmp/migrate_out.txt debug/last_migration_output.txt 2>/dev/null || echo "(no output)" > debug/last_migration_output.txt
          cat /tmp/migrate_meta.txt >> debug/last_migration_output.txt 2>/dev/null || true
          git config user.email "ci-bot@github-actions"
          git config user.name "CI Bot"
          git add debug/last_migration_output.txt
          git diff --cached --quiet || git commit --no-verify -m "ci: record migration output [skip ci]"
          git push origin main

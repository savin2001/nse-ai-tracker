name: Apply Database Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase (nse schema)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations via Supabase Management API
        id: migrate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          OUTPUT=$(python3 scripts/migrate.py 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "output<<ENDOFOUTPUT" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "ENDOFOUTPUT" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Post output as commit comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          MIGRATE_OUTPUT: ${{ steps.migrate.outputs.output }}
          MIGRATE_EXIT: ${{ steps.migrate.outputs.exit_code }}
        run: |
          STATUS="✅ Success"
          if [ "$MIGRATE_EXIT" != "0" ]; then STATUS="❌ Failed (exit $MIGRATE_EXIT)"; fi
          BODY="## Migration Run — $STATUS

\`\`\`
${MIGRATE_OUTPUT}
\`\`\`"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"

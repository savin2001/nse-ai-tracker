name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  frontend:
    name: Frontend (Vite + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build
      - run: cd frontend && npm test

  api:
    name: API (Express + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: api/package-lock.json }
      - run: cd api && npm ci
      - run: cd api && npm run build
      - run: cd api && npm test

  workers:
    name: Workers (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: cd workers && pip install -r requirements.txt
      - run: cd workers && pytest --cov=. --cov-report=xml -v

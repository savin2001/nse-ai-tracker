name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  frontend:
    name: Frontend (Vite + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build
      # Thresholds (lines/functions/branches ≥70%) are enforced in vitest.config.ts
      - run: cd frontend && npm test -- --coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  api:
    name: API (Express + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - run: cd api && npm ci
      - run: cd api && npm run build
      # Thresholds (lines/functions/branches ≥85%) are enforced in vitest.config.ts
      - run: cd api && npm test -- --coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./api/coverage/coverage-final.json
          flags: api
          fail_ci_if_error: false

  workers:
    name: Workers (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cd workers && pip install -r requirements.txt
      # --cov-fail-under=80 enforces coverage threshold in CI
      - run: cd workers && pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=65 -v
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./workers/coverage.xml
          flags: workers
          fail_ci_if_error: false

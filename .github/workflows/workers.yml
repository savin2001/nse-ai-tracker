name: Workers

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Manual run — pick a single worker or run all of them.
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - price_collector
          - price_collector_backfill
          - news_fetcher
          - event_detector
          - ai_worker
          - email_worker

  # Scheduled runs (all times UTC — NSE is UTC+3 / EAT)
  #
  # Intraday (06:00 & 12:00):  price_collector only
  # Intraday (every 2 h):      news_fetcher + event_detector
  # Post-close chain (15:00):  price_collector → news_fetcher → event_detector
  #                             → ai_worker → email_worker  (all in one job,
  #                             in order, so email always has the freshest data)
  schedule:
    - cron: "0 6  * * 1-5"              # price_collector — morning run
    - cron: "0 12 * * 1-5"             # price_collector — midday run
    - cron: "30 5,7,9,11,13 * * 1-5"  # news + events   — intraday every 2 h
    - cron: "0 15 * * 1-5"             # post-close chain (see above)

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  run-workers:
    name: Run ${{ github.event.inputs.worker || 'scheduled' }} workers
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: workers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── price_collector ──────────────────────────────────────────────────────
      # Runs on: morning, midday, post-close chain, manual
      - name: Run price_collector
        if: |
          github.event_name == 'schedule' && (
            github.event.schedule == '0 6 * * 1-5'  ||
            github.event.schedule == '0 12 * * 1-5' ||
            github.event.schedule == '0 15 * * 1-5'
          ) ||
          github.event.inputs.worker == 'price_collector' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TV_USERNAME:               ${{ secrets.TV_USERNAME }}
          TV_PASSWORD:               ${{ secrets.TV_PASSWORD }}
        run: python price_collector.py

      # ── price_collector_backfill ─────────────────────────────────────────────
      - name: Run price_collector (backfill 365 days)
        if: github.event.inputs.worker == 'price_collector_backfill'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TV_USERNAME:               ${{ secrets.TV_USERNAME }}
          TV_PASSWORD:               ${{ secrets.TV_PASSWORD }}
        run: python price_collector.py --backfill

      # ── news_fetcher ─────────────────────────────────────────────────────────
      # Runs on: intraday every-2h sweep, post-close chain, manual
      - name: Run news_fetcher
        if: |
          github.event_name == 'schedule' && (
            github.event.schedule == '30 5,7,9,11,13 * * 1-5' ||
            github.event.schedule == '0 15 * * 1-5'
          ) ||
          github.event.inputs.worker == 'news_fetcher' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python news_fetcher.py

      # ── event_detector ───────────────────────────────────────────────────────
      # Runs on: intraday every-2h sweep, post-close chain, manual
      - name: Run event_detector
        if: |
          github.event_name == 'schedule' && (
            github.event.schedule == '30 5,7,9,11,13 * * 1-5' ||
            github.event.schedule == '0 15 * * 1-5'
          ) ||
          github.event.inputs.worker == 'event_detector' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          TV_USERNAME:               ${{ secrets.TV_USERNAME }}
          TV_PASSWORD:               ${{ secrets.TV_PASSWORD }}
        run: python event_detector.py

      # ── ai_worker ────────────────────────────────────────────────────────────
      # Runs on: post-close chain only (needs final prices + news), manual
      - name: Run ai_worker
        if: |
          github.event_name == 'schedule' &&
            github.event.schedule == '0 15 * * 1-5' ||
          github.event.inputs.worker == 'ai_worker' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ai_worker.py

      # ── email_worker ─────────────────────────────────────────────────────────
      # Runs LAST in the post-close chain — always has fresh prices, news,
      # events, and AI signals because the steps above complete first.
      - name: Run email_worker
        if: |
          github.event_name == 'schedule' &&
            github.event.schedule == '0 15 * * 1-5' ||
          github.event.inputs.worker == 'email_worker' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:                ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:               ${{ secrets.ALERT_EMAIL }}
        run: python email_worker.py digest

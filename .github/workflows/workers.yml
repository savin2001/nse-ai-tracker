name: Workers

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Manual run — pick a single worker or run all of them.
  # Use this to seed the DB on first deploy or re-run on demand.
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - price_collector
          - price_collector_backfill
          - news_fetcher
          - event_detector
          - ai_worker
          - email_worker

  # Scheduled runs (all times UTC — NSE is UTC+3 / EAT)
  # Price collection: 06:00 + 12:00 UTC = 09:00 + 15:00 EAT
  # News + events:    05:30–14:30 UTC every 2 h = 08:30–17:30 EAT
  # AI analysis:      15:00 UTC        = 18:00 EAT (after market close)
  # Email digest:     15:30 UTC        = 18:30 EAT (after AI analysis)
  schedule:
    - cron: "0 6  * * 1-5"   # price_collector  — morning run
    - cron: "0 12 * * 1-5"   # price_collector  — afternoon run
    - cron: "30 5,7,9,11,13 * * 1-5"  # news_fetcher + event_detector — every 2 h
    - cron: "0 15 * * 1-5"   # ai_worker        — post-close analysis
    - cron: "30 15 * * 1-5"  # email_worker     — digest after AI analysis

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  run-workers:
    name: Run ${{ github.event.inputs.worker || 'scheduled' }} workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: workers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── price_collector ──────────────────────────────────────────────────────
      - name: Run price_collector
        if: |
          github.event_name == 'schedule' && (
            github.event.schedule == '0 6 * * 1-5' ||
            github.event.schedule == '0 12 * * 1-5'
          ) ||
          github.event.inputs.worker == 'price_collector' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TV_USERNAME:               ${{ secrets.TV_USERNAME }}
          TV_PASSWORD:               ${{ secrets.TV_PASSWORD }}
        run: python price_collector.py

      # ── price_collector_backfill ─────────────────────────────────────────────
      - name: Run price_collector (backfill 365 days)
        if: github.event.inputs.worker == 'price_collector_backfill'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TV_USERNAME:               ${{ secrets.TV_USERNAME }}
          TV_PASSWORD:               ${{ secrets.TV_PASSWORD }}
        run: python price_collector.py --backfill

      # ── news_fetcher ─────────────────────────────────────────────────────────
      - name: Run news_fetcher
        if: |
          github.event_name == 'schedule' &&
            github.event.schedule == '30 5,7,9,11,13 * * 1-5' ||
          github.event.inputs.worker == 'news_fetcher' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python news_fetcher.py

      # ── event_detector ───────────────────────────────────────────────────────
      - name: Run event_detector
        if: |
          github.event_name == 'schedule' &&
            github.event.schedule == '30 5,7,9,11,13 * * 1-5' ||
          github.event.inputs.worker == 'event_detector' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          TV_USERNAME:               ${{ secrets.TV_USERNAME }}
          TV_PASSWORD:               ${{ secrets.TV_PASSWORD }}
        run: python event_detector.py

      # ── ai_worker ────────────────────────────────────────────────────────────
      - name: Run ai_worker
        if: |
          github.event_name == 'schedule' &&
            github.event.schedule == '0 15 * * 1-5' ||
          github.event.inputs.worker == 'ai_worker' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ai_worker.py

      # ── email_worker ─────────────────────────────────────────────────────────
      - name: Run email_worker
        if: |
          github.event_name == 'schedule' &&
            github.event.schedule == '30 15 * * 1-5' ||
          github.event.inputs.worker == 'email_worker' ||
          github.event.inputs.worker == 'all'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:                ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:               ${{ secrets.ALERT_EMAIL }}
        run: python email_worker.py digest

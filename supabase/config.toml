project_id = "uryyfzzfkbcbkftnzzix"

[api]
enabled = true
port = 54321
schemas = ["public", "nse", "graphql_public"]
extra_search_path = ["nse", "public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://nse-ai-tracker.netlify.app",
  "https://nse-ai-tracker.netlify.app/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
# Custom templates (relative to supabase/templates/)
invite_template = "templates/invite.html"
confirmation_template = "templates/confirm.html"
recovery_template = "templates/recovery.html"
email_change_template = "templates/email_change.html"

[auth.email.smtp]
# Set via env: SUPABASE_AUTH_SMTP_HOST, SUPABASE_AUTH_SMTP_PORT,
# SUPABASE_AUTH_SMTP_USER, SUPABASE_AUTH_SMTP_PASS, SUPABASE_AUTH_SMTP_SENDER_NAME

[auth.sessions]
timebox = "24h"
inactivity_timeout = "8h"

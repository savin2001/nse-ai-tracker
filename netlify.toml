[build]
  base    = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://nse-ai-tracker-api.onrender.com; frame-src 'none'; object-src 'none'"

# SPA fallback — all routes served from index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
